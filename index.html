<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Infinity Idle</title>
<link rel="icon" type="image/jpeg" href="img/gold-coins.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;600;800&family=Alegreya+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="grain"></div>

<header id="topbar">
  <button id="panel-toggle" title="Mostrar/ocultar painel de recursos">☰</button>
  <h1 id="game-title">Project <span>Infinity</span> Idle</h1>
  <div id="phase-wrap">
    <div id="phase-badge" title="Sua fase atual de progressão">Fase I — O Despertar</div>
    <div id="phase-progress"><div id="phase-progress-fill"></div></div>
  </div>
  <button id="codex-btn" title="Códex — releia as histórias de Mestre Aldric">📖 Códex</button>
  <div id="essence-badge" class="hidden" title="Essência: +2% de produção global por ponto, permanente">
    <span class="ess-icon">✦</span><span id="essence-count">0</span> Essência
  </div>
</header>

<div id="event-banner" class="hidden"></div>

<main id="layout">

  <!-- ===== Painel esquerdo: recursos + clique ===== -->
  <aside id="left-panel">
    <div id="gold-box">
      <div id="gold-amount">0</div>
      <div id="gold-label">ouro</div>
      <div id="gold-rate">+0/s</div>
    </div>

    <button id="click-coin" title="Clique para minerar ouro">
      <div class="coin-shine"></div>
    </button>
    <div id="click-power-label">+1 por clique</div>

    <div id="left-extra">
      <div id="resources-box"></div>
      <div id="buffs-box"></div>
      <div id="closest-ach-box"></div>

      <div id="log-box">
        <div id="log-title">Crônicas</div>
        <div id="log-feed"></div>
      </div>
    </div>
  </aside>

  <!-- ===== Área central: abas ===== -->
  <section id="main-panel">
    <nav id="tabs"></nav>
    <div id="tab-content"></div>
  </section>

</main>

<div id="float-layer"></div>
<div id="toast-layer"></div>
<div id="modal-layer" class="hidden"></div>

<script src="js/format.js"></script>
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/game.js"></script>
<script src="js/expansion.js"></script>
<script src="js/relics.js"></script>
<script src="js/bosses.js"></script>
<script src="js/gearsets.js"></script>
<script src="js/layers.js"></script>
<script src="js/worldtree.js"></script>
<script src="js/ui.js"></script>
<script src="js/ui-ext.js"></script>
<script src="js/relics-ui.js"></script>
<script src="js/bosses-ui.js"></script>
<script src="js/gearsets-ui.js"></script>
<script src="js/layers-ui.js"></script>
<script src="js/worldtree-ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
